<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="#/" class="nav-logo">يَقِظ</a>

        <li><a href="#/categories" id="nav-categories">الفئات</a></li>
        <li><a href="#/about" id="nav-about">لماذا يَقِظ؟</a></li>

          <div class="price">٤٩ ريال</div>
          <div class="period">سنوياً (وفّر ٥٨٪)</div>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%">اشترك الآن</button>
    </div>
  </div>

  <footer class="footer">
    <p>صُنع بحب ❤️ من Abdullah Alrashidi</p>
  </footer>
